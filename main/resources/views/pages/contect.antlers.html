<section class="page-header">
            <div class="bg-img" data-background="assets/img/bg-img/page-header-bg.png"></div>
            <div class="overlay"></div>
            <div class="container">
                <div class="page-header-content">
                    <h1 class="title">Contact Us</h1>
                    <h4 class="sub-title"><a class='home' href='/'>Home </a><span class="icon">-</span><a class='inner-page' href='#'> Contact Us</a></h4>
                </div>
            </div>
        </section>
        <!-- ./ page-header -->

        <section class="contact-section pt-150 pb-150">
            <div class="container container-2">
                <div class="row section-heading-wrap w-100 ml-0">
                    <div class="shape"><img src="assets/img/shapes/section-heading.png" alt="shape"></div>
                    <div class="col-lg-4 col-md-12">
                        <div class="section-heading mb-0">
                            <h4 class="sub-heading" data-text-animation="fade-in-right" data-split="char" data-duration="0.9" data-stagger="0.03">get in touch</h4>
                        </div>
                    </div>
                    <div class="col-lg-8 col-md-12">
                        <div class="section-heading section-heading-2 mb-0">
                            <h2 class="section-title title-2">Planning a Painting <span>Work? Let’s <br> Make</span> It Happen</h2>
                        </div>
                    </div>
                </div>
                <div class="row request-wrap contact-page-area">
                    <div class="col-lg-6">
                        <div class="request-content">
                            <div class="request-item-wrap">
                                <div class="request-item white-content">
                                    <span>Address</span>
                                    <p>{{ contact_details:address | strip_tags }}</p>
                                </div>
                                <div class="request-item white-content">
                                    <span>Contact Us</span>
                                    <a href="tel:{{ contact_details:telephone }}">{{ contact_details:telephone }}</a>
                                    <a href="mailto:{{ contact_details:email }}">{{ contact_details:email }}</a>
                                </div>
                            </div>
                            <div class="contact-img">
                                <img src="assets/img/images/contact-img-1.png" alt="img">
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="request-form-wrap">
                            <form action="https://antra.ibthemespro.com/mail.php" method="post" id="ajax_contact" class="form-horizontal">
                                <div class="form-group row">
                                    <div class="col-md-6">
                                        <div class="form-item">
                                            <h4 class="form-title">Full Name *</h4>
                                            <input type="text" id="fullname" name="fullname" class="form-control" placeholder="Your Name">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-item">
                                            <h4 class="form-title">phone *</h4>
                                            <input type="text" id="phone" name="phone" class="form-control" placeholder="8866117573">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-md-6">
                                        <div class="form-item">
                                            <h4 class="form-title">Email Address *</h4>
                                            <input type="text" id="email" name="email" class="form-control" placeholder="yourname@example.com">
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-item">
                                            <h4 class="form-title">Services *</h4>
                                            <input type="text" id="service" name="service" class="form-control" placeholder="e.g. Home Painting">
                                        </div>
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-md-12">
                                        <div class="form-item message-item">
                                            <h4 class="form-title">Write Message *</h4>
                                            <textarea id="message" name="message" cols="30" rows="5" class="form-control address" placeholder="Your message.."></textarea>
                                        </div>
                                    </div>
                                </div>
                                <div class="submit-btn">
                                    <button id="submit" class="tl-primary-btn" type="submit">Send Message <span class="icon"><i class="fa-regular fa-arrow-right"></i></span></button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- ./ contact-section -->

        <div class="map-wrapper pb-150">
            <div class="container">
                <iframe src="https://maps.google.com/maps?q=GF-28%20Centre%20Point,%20Opp.%20GIDC%20Police%20Station,%20Ankleshwar&amp;t=&amp;z=15&amp;ie=UTF8&amp;iwloc=&amp;output=embed" width="100%" height="620" frameborder="0" style="border:0;" allowfullscreen=""></iframe>
            </div>
        </div>
