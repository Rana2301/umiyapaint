 <header class="header sticky-active">
            <div class="primary-header">
                <div class="container">
                    <div class="primary-header-inner">
                        <div class="header-left-wrap">
                            <div class="header-logo d-lg-block">
                                <a href="index.html">
                                    <img src="/assets/img/logo/logo-2.png" alt="Umiya Hardware & Paints Logo">
                                </a>
                            </div>
                            <div class="header-menu-wrap">
                                <div class="mobile-menu-items">

    <ul>

        {{ nav:main_nav }}

            <li>
                <a href="{{ url }}">
                    {{ title }}
                </a>
            </li>

        {{ /nav:main_nav }}

    </ul>

</div>
                            </div>
                            <!-- /.header-menu-wrap -->
                        </div>
                        <div class="header-right-wrap">
                            <a href="tel:{{ contact_details:telephone }}" class="header-contact">
                                <span class="icon"><i class="fa-regular fa-phone"></i></span>
                                <span class="content">
                                    <span class="call-text">Call Us Phone</span>
                                    <span class="call-number">{{ contact_details:telephone }}</span>
                                </span>
                            </a>
                            <div class="header-btn-wrap">
                                <a href="contact.html" class="tl-primary-btn header-btn">Get in Touch</a>
                            </div>
                            <div class="search-icon dl-search-icon">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </div>
                            <div class="sidebar-icon">
                                <button class="sidebar-trigger open">
                                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M11 2C11 0.89543 11.8954 0 13 0H14C15.1046 0 16 0.895431 16 2V3C16 4.10457 15.1046 5 14 5H13C11.8954 5 11 4.10457 11 3V2Z" fill="currentColor"/>

                    </div>
                    <!-- /.primary-header-inner -->
                </div>
            </div>
        </header>
